name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run linting and type checks
        run: npm run pre-commit

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          prune-cache: false

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Wait for frontend build
        uses: lewagon/wait-on-check-action@v1.4.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Build Frontend'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Run Python tests with coverage
        run: uv run pytest tests/ --ignore=tests/e2e --ignore=tests/integration --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html
        env:
          ENVIRONMENT: test

      - name: Upload Python coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

      - name: Upload flamegraph profiles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-flamegraphs
          path: test_profiles/
          if-no-files-found: ignore
          retention-days: 7

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run TypeScript tests with coverage
        run: npm run test:coverage
        env:
          LANG: en_AU.UTF-8

      - name: Upload TypeScript coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage-reports
          path: coverage/
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          prune-cache: false

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: |
            /tmp/.docker-cache
            ~/.docker
          key: ${{ runner.os }}-docker-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-docker-supabase-

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local development
        run: supabase start

      - name: Wait for frontend build
        uses: lewagon/wait-on-check-action@v1.4.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Build Frontend'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Extract environment variables and run tests
        run: |
          # Extract Supabase environment variables using shared script
          source scripts/extract_supabase_env.sh

          # Run integration tests
          uv run pytest tests/integration/ -v
        env:
          ENVIRONMENT: test
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Stop Supabase
        if: always()
        run: supabase stop

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install Node dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(uv run python -c "import importlib.metadata; print(importlib.metadata.version('playwright'))")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-python-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-python-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          # Install browser binaries for Python Playwright
          uv run python -m playwright install chromium
          uv run python -m playwright install-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: |
            /tmp/.docker-cache
            ~/.docker
          key: ${{ runner.os }}-docker-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-docker-supabase-

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run E2E tests with isolated Supabase
        run: npm run test:e2e
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/e2e_pytest_*.txt
            /tmp/e2e_server_*.txt
          if-no-files-found: ignore
          retention-days: 7
