# fly.toml app configuration file for codeleash
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'codeleash'
primary_region = 'iad'

[env]
  ENVIRONMENT = 'production'
  PYTHONPATH = '/app'

[processes]
  web = 'uv run python main.py'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 800

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[metrics]
  port = 9091
  path = '/metrics'
